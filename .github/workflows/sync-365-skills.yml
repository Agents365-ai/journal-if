name: Sync to 365-skills

# Pushes changes under skills/journal-if/ into
# Agents365-ai/365-skills:plugins/journal-if/skills/journal-if/
# and bumps the version field in marketplace.json.
#
# Required repo secret: SYNC_365_SKILLS_TOKEN — fine-grained PAT or GitHub App
# token with "Contents: write" on Agents365-ai/365-skills.

on:
  push:
    branches: [main]
    paths:
      - 'skills/journal-if/**'
  workflow_dispatch: {}

concurrency:
  group: sync-365-skills
  cancel-in-progress: false

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout source
        uses: actions/checkout@v4
        with:
          path: source

      - name: Checkout 365-skills
        uses: actions/checkout@v4
        with:
          repository: Agents365-ai/365-skills
          token: ${{ secrets.SYNC_365_SKILLS_TOKEN }}
          path: target

      - name: Sync skill files
        run: |
          set -euo pipefail
          dest=target/plugins/journal-if/skills/journal-if
          mkdir -p "$dest"
          rsync -a --delete source/skills/journal-if/ "$dest/"

      - name: Bump version in marketplace.json
        run: |
          set -euo pipefail
          version=$(python3 -c '
          import re
          text = open("source/skills/journal-if/SKILL.md").read()
          m = re.search(r"^version:\s*(\S+)", text, re.M)
          print(m.group(1).strip() if m else "")
          ')
          if [ -z "$version" ]; then
            echo "::warning::could not parse version from SKILL.md frontmatter"
            exit 0
          fi
          echo "Source version: $version"
          python3 - "$version" <<'PY'
          import re, sys
          version = sys.argv[1]
          path = "target/.claude-plugin/marketplace.json"
          content = open(path).read()
          pattern = r'("name":\s*"journal-if"(?:[^{}]|\{[^{}]*\})*?"version":\s*)"[^"]*"'
          new_content, n = re.subn(pattern, lambda m: m.group(1) + f'"{version}"', content, count=1, flags=re.S)
          if n == 0:
              # First-time: entry doesn't exist yet — this is expected for new skills
              print("::notice::journal-if plugin entry not yet in marketplace.json (new skill)")
          else:
              open(path, "w").write(new_content)
              print(f"marketplace.json updated to {version}")
          PY

      - name: Commit and push to 365-skills
        working-directory: target
        run: |
          set -euo pipefail
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add plugins/journal-if .claude-plugin/marketplace.json
          if git diff --staged --quiet; then
            echo "No changes to sync"
            exit 0
          fi
          git commit -m "chore: sync journal-if from source" \
                     -m "Triggered by ${{ github.repository }}@${{ github.sha }}"
          git push
